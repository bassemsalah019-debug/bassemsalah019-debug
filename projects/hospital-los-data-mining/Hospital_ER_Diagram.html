  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    font-family: 'IBM Plex Sans', sans-serif;
    overflow: auto;
  }
  .header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
    border-bottom: 1px solid rgba(100, 180, 255, 0.15);
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(12px);
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #e8edf5; }
  .header h1 span { color: #60a5fa; }
  .legend { display: flex; gap: 18px; font-size: 11px; color: #8892a8; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-shape { width: 16px; height: 12px; border-radius: 3px; border: 2px solid; }
  .canvas-container { width: 100%; overflow: auto; padding: 10px; }
</style>
</head>
<body>
<div class="header">
  <h1>🏥 Hospital <span>ER Diagram</span></h1>
  <div class="legend">

</div>
